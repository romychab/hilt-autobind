site_name: Hilt AutoBind
site_description: Auto-generate Dagger Hilt binding modules with a single annotation
site_url: https://docs.uandcode/hilt-autobind/
repo_url: https://github.com/romychab/hilt-autobind
repo_name: romychab/hilt-autobind

docs_dir: build/mkdocs-src
site_dir: build/mkdocs

theme:
  name: material
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Basic Usage: basic-usage.md
  - Scopes & Components: scopes-and-components.md
  - Class Factory: class-factory.md
  - Delegate Factory: delegate-factory.md
  - Set Multibinding: multibinding-set.md
  - Map Multibinding: multibinding-map.md
  - Qualifiers: qualifiers.md
  - Annotation Aliases: annotation-aliases.md
  - Multi-Module Projects: multi-module.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
